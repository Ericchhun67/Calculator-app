<!-- 
 Very basic HTML template for the calculator app. using css, and js files only.

-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Simple Calculator</h1>
    </header>
    <div class="calculator">
        <input type="text" id="display" class="display">
        <div class="buttons">
            <!-- call the add function -->
            <button class="button" onclick="calculateToDisplay('7')">7</button>
            <button class="button" onclick="calculateToDisplay('8')">8</button>
            <button class="button" onclick="calculateToDisplay('9')">9</button>
            <button class="button operator" onclick="calculateToDisplay('/')">/</button>
            <button class="button" onclick="calculateToDisplay('4')">4</button>
            <button class="button" onclick="calculateToDisplay('5')">5</button>
            <button class="button" onclick="calculateToDisplay('6')">6</button>
            <button class="button operator" onclick="calculateToDisplay('*')">*</button>
            <button class="button" onclick="calculateToDisplay('1')">1</button>
            <button class="button" onclick="calculateToDisplay('2')">2</button>
            <button class="button" onclick="calculateToDisplay('3')">3</button>
            <button class="button operator" onclick="calculateToDisplay('-')">-</button>
            <button class="button" onclick="calculateToDisplay('0')">0</button>
            <button class="button" onclick="calculateToDisplay('.')">.</button>
            <!-- enter negative -->
            <button class="button" onclick="calculateToDisplay('-')">(-)</button>
            <button class="button operator" onclick="calculateResult()">=</button>
            <button class="button operator" onclick="calculateToDisplay('+')">+</button>
            <button class="button operator" onclick="clearDisplay()">C</button>
            <script>
                function calculateToDisplay(value) {
                    document.getElementById('display').value += value;
                }

                function calculateResult() {
                    try {
                        const result = eval(document.getElementById('display').value);
                        document.getElementById('display').value = result;
                    } catch (error) {
                        document.getElementById('display').value = 'Error';
                    }
                }

                function clearDisplay() {
                    document.getElementById('display').value = '';
                }
            </script>
        </div>
</body>
</html>
